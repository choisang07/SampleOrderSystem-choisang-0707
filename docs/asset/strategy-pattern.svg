<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="Segoe UI, Malgun Gothic, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arrowHollow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M1,1 L11,6 L1,11 z" fill="white" stroke="#333" stroke-width="1"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="620" fill="white"/>
  <text x="500" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">Strategy 패턴 - 생산 큐 스케줄링</text>

  <!-- Class diagram -->
  <text x="20" y="60" font-size="13" fill="#666">① 클래스 구조 (Domain/Scheduling/)</text>

  <rect x="60" y="75" width="220" height="70" fill="#fffef5" stroke="#333" stroke-width="1.6"/>
  <text x="170" y="98" text-anchor="middle" font-size="14" font-weight="bold">ProductionService</text>
  <text x="170" y="118" text-anchor="middle" font-size="11.5">- strategy_: IProductionSchedulingStrategy&amp;</text>
  <text x="170" y="134" text-anchor="middle" font-size="11.5">+ enqueue() / completeActive()</text>

  <rect x="400" y="75" width="260" height="90" fill="#eef2ff" stroke="#2b6cb0" stroke-width="1.8"/>
  <text x="530" y="95" text-anchor="middle" font-size="12.5" font-style="italic" fill="#2b6cb0">&lt;&lt;interface&gt;&gt;</text>
  <text x="530" y="115" text-anchor="middle" font-size="14" font-weight="bold">IProductionSchedulingStrategy</text>
  <line x1="400" y1="122" x2="660" y2="122" stroke="#2b6cb0"/>
  <text x="412" y="139" font-size="11">+ enqueue(entry)</text>
  <text x="412" y="155" font-size="11">+ peekActive() / completeActive()</text>

  <line x1="280" y1="110" x2="398" y2="110" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="335" y="100" text-anchor="middle" font-size="11" fill="#555">uses</text>

  <rect x="410" y="230" width="230" height="60" rx="6" fill="#e6f4ea" stroke="#2f855a" stroke-width="1.6"/>
  <text x="525" y="255" text-anchor="middle" font-size="13" font-weight="bold">FifoSchedulingStrategy</text>
  <text x="525" y="275" text-anchor="middle" font-size="11">현재 유일한 구현체 (requirement.md 5.6절)</text>

  <rect x="700" y="230" width="250" height="60" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1.4" stroke-dasharray="4,3"/>
  <text x="825" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#666">(미래 확장 예시)</text>
  <text x="825" y="273" text-anchor="middle" font-size="11" fill="#666">PerSampleSchedulingStrategy</text>

  <line x1="525" y1="230" x2="528" y2="167" stroke="#666" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#arrowHollow)"/>
  <line x1="825" y1="230" x2="560" y2="167" stroke="#999" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#arrowHollow)"/>

  <rect x="700" y="75" width="250" height="90" rx="6" fill="#f7f7f7" stroke="#ccc"/>
  <text x="715" y="97" font-size="12" fill="#333">§10 미결정 사항: "생산 큐가 단일 큐인지</text>
  <text x="715" y="114" font-size="12" fill="#333">시료별 큐인지"가 확정되면, 이 인터페이스의</text>
  <text x="715" y="131" font-size="12" fill="#333">새 구현체로 교체 — ProductionService/</text>
  <text x="715" y="148" font-size="12" fill="#333">OrderService 코드는 변경 불필요 (OCP).</text>

  <!-- Flow -->
  <text x="20" y="345" font-size="13" fill="#666">② 실행 흐름</text>

  <rect x="60" y="365" width="180" height="50" rx="6" fill="#e8f0fe" stroke="#2b6cb0"/>
  <text x="150" y="395" text-anchor="middle" font-size="13" font-weight="bold">OrderService</text>

  <rect x="300" y="365" width="180" height="50" rx="6" fill="#fffef5" stroke="#333"/>
  <text x="390" y="395" text-anchor="middle" font-size="13" font-weight="bold">ProductionService</text>

  <rect x="540" y="365" width="220" height="50" rx="6" fill="#e6f4ea" stroke="#2f855a"/>
  <text x="650" y="395" text-anchor="middle" font-size="13" font-weight="bold">FifoSchedulingStrategy</text>

  <line x1="240" y1="382" x2="298" y2="382" stroke="#333" marker-end="url(#arrow)"/>
  <text x="269" y="373" text-anchor="middle" font-size="10.5">approve() 재고부족</text>

  <line x1="480" y1="382" x2="538" y2="382" stroke="#333" marker-end="url(#arrow)"/>
  <text x="509" y="373" text-anchor="middle" font-size="10.5">enqueue()</text>

  <rect x="300" y="450" width="180" height="50" rx="6" fill="#fef3e2" stroke="#c05621"/>
  <text x="390" y="480" text-anchor="middle" font-size="13" font-weight="bold">MonitorService</text>

  <line x1="480" y1="465" x2="620" y2="417" stroke="#333" marker-end="url(#arrow)"/>
  <text x="590" y="450" text-anchor="middle" font-size="10.5">peekActive()/completeActive()</text>

  <rect x="20" y="535" width="930" height="60" rx="8" fill="#f7f7f7" stroke="#ccc"/>
  <text x="35" y="558" font-size="12.5" fill="#333">requiredQuantity = ceil(부족분/yield), totalProductionMinutes = avgProductionTime × requiredQuantity</text>
  <text x="35" y="577" font-size="12.5" fill="#333">계산과 "큐 head만 생산 중, 나머지는 대기"라는 FIFO 규칙은 전략 객체 안에 캡슐화된다.</text>
</svg>
