<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1350" font-family="Segoe UI, Malgun Gothic, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arrowHollow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto-start-reverse">
      <path d="M1,1 L11,6 L1,11 z" fill="white" stroke="#333" stroke-width="1"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1300" height="1350" fill="white"/>
  <text x="650" y="30" text-anchor="middle" font-size="21" font-weight="bold" fill="#1a1a1a">SampleOrderSystem 전체 클래스 다이어그램</text>
  <text x="650" y="50" text-anchor="middle" font-size="12.5" fill="#666">계층별 배치 · 패턴 세부 흐름은 docs/asset/{state,repository-dip,factory}-pattern.svg 참고</text>

  <!-- ============ Layer bands ============ -->
  <g font-size="12" fill="#888">
    <text x="1240" y="105">View</text>
    <text x="1240" y="175">Controller</text>
    <text x="1240" y="290">Service</text>
    <text x="1240" y="480">Domain (State / Factory)</text>
    <text x="1240" y="820">Repository</text>
    <text x="1240" y="1030">Persistence</text>
    <text x="1240" y="1110">Model</text>
  </g>
  <line x1="20" y1="115" x2="1220" y2="115" stroke="#eee"/>
  <line x1="20" y1="200" x2="1220" y2="200" stroke="#eee"/>
  <line x1="20" y1="500" x2="1220" y2="500" stroke="#eee"/>
  <line x1="20" y1="840" x2="1220" y2="840" stroke="#eee"/>
  <line x1="20" y1="1040" x2="1220" y2="1040" stroke="#eee"/>

  <!-- ============ View ============ -->
  <rect x="500" y="70" width="200" height="40" fill="#fffef5" stroke="#333" stroke-width="1.6"/>
  <text x="600" y="95" text-anchor="middle" font-size="13" font-weight="bold">ConsoleView</text>

  <!-- ============ Controller ============ -->
  <rect x="480" y="150" width="240" height="40" fill="#fffef5" stroke="#333" stroke-width="1.6"/>
  <text x="600" y="175" text-anchor="middle" font-size="13" font-weight="bold">MainController</text>

  <line x1="600" y1="150" x2="600" y2="112" stroke="#333" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- ============ Service layer ============ -->
  <rect x="30"  y="230" width="200" height="55" rx="4" fill="#fffef5" stroke="#333" stroke-width="1.5"/>
  <text x="130" y="253" text-anchor="middle" font-size="12.5" font-weight="bold">SampleService</text>
  <text x="130" y="270" text-anchor="middle" font-size="10">register/find/search</text>

  <rect x="250" y="230" width="200" height="55" rx="4" fill="#fffef5" stroke="#333" stroke-width="1.5"/>
  <text x="350" y="253" text-anchor="middle" font-size="12.5" font-weight="bold">OrderService</text>
  <text x="350" y="270" text-anchor="middle" font-size="10">reserve/approve/reject</text>

  <rect x="470" y="230" width="200" height="55" rx="4" fill="#fffef5" stroke="#333" stroke-width="1.5"/>
  <text x="570" y="253" text-anchor="middle" font-size="12.5" font-weight="bold">ProductionService</text>
  <text x="570" y="270" text-anchor="middle" font-size="10">enqueue/completeActive (큐는 Repository로 접근)</text>

  <rect x="690" y="230" width="200" height="55" rx="4" fill="#fffef5" stroke="#333" stroke-width="1.5"/>
  <text x="790" y="253" text-anchor="middle" font-size="12.5" font-weight="bold">ReleaseService</text>
  <text x="790" y="270" text-anchor="middle" font-size="10">release</text>

  <rect x="910" y="230" width="200" height="55" rx="4" fill="#fffef5" stroke="#333" stroke-width="1.5"/>
  <text x="1010" y="253" text-anchor="middle" font-size="12.5" font-weight="bold">MonitorService</text>
  <text x="1010" y="270" text-anchor="middle" font-size="10">order/inventory/production</text>

  <!-- Controller -> each Service -->
  <line x1="540" y1="190" x2="150" y2="228" stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="570" y1="190" x2="360" y2="228" stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="630" y1="190" x2="580" y2="228" stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="660" y1="190" x2="790" y2="228" stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="690" y1="190" x2="1005" y2="228" stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- OrderService -> ProductionService -->
  <line x1="450" y1="257" x2="468" y2="257" stroke="#333" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- ============ Domain layer ============ -->
  <!-- State group -->
  <rect x="30" y="520" width="390" height="130" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="45" y="537" font-size="11" fill="#888">★ State 패턴 (Domain/OrderState/)</text>

  <rect x="150" y="550" width="160" height="45" fill="#eef2ff" stroke="#2b6cb0" stroke-width="1.6"/>
  <text x="230" y="567" text-anchor="middle" font-size="11.5" font-style="italic" fill="#2b6cb0">&lt;&lt;interface&gt;&gt;</text>
  <text x="230" y="583" text-anchor="middle" font-size="12" font-weight="bold">IOrderState</text>

  <g font-size="10.5">
    <rect x="45"  y="615" width="88" height="26" rx="4" fill="#e8f0fe" stroke="#2b6cb0"/>
    <text x="89" y="632" text-anchor="middle">Reserved</text>
    <rect x="140" y="615" width="88" height="26" rx="4" fill="#fef3e2" stroke="#c05621"/>
    <text x="184" y="632" text-anchor="middle">Producing</text>
    <rect x="235" y="615" width="88" height="26" rx="4" fill="#e6f4ea" stroke="#2f855a"/>
    <text x="279" y="632" text-anchor="middle">Confirmed</text>
    <rect x="330" y="615" width="80" height="26" rx="4" fill="#f3e8fd" stroke="#6b46c1"/>
    <text x="370" y="632" text-anchor="middle" font-size="9.5">Released/Rejected</text>
  </g>
  <text x="45" y="600" font-size="9.5" fill="#888">(5개 모두 stateless singleton — static instance())</text>
  <line x1="89"  y1="615" x2="205" y2="597" stroke="#666" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowHollow)"/>
  <line x1="184" y1="615" x2="215" y2="597" stroke="#666" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowHollow)"/>
  <line x1="279" y1="615" x2="245" y2="597" stroke="#666" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowHollow)"/>
  <line x1="370" y1="615" x2="260" y2="597" stroke="#666" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowHollow)"/>

  <!-- Factory group -->
  <rect x="440" y="520" width="200" height="130" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="455" y="537" font-size="11" fill="#888">★ Factory 패턴</text>

  <rect x="455" y="560" width="170" height="34" rx="4" fill="#fef3e2" stroke="#c05621"/>
  <text x="540" y="581" text-anchor="middle" font-size="11.5" font-weight="bold">SampleFactory</text>

  <rect x="455" y="610" width="170" height="34" rx="4" fill="#fef3e2" stroke="#c05621"/>
  <text x="540" y="631" text-anchor="middle" font-size="11.5" font-weight="bold">OrderFactory</text>

  <!-- Service -> Domain -->
  <line x1="350" y1="285" x2="230" y2="518" stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="360" y1="285" x2="530" y2="518" stroke="#333" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="130" y1="285" x2="500" y2="518" stroke="#333" stroke-width="1.1" marker-end="url(#arrow)"/>
  <text x="450" y="510" text-anchor="middle" font-size="10" fill="#555">uses</text>

  <!-- ============ Repository layer ============ -->
  <text x="45" y="670" font-size="11" fill="#888">★ Repository 패턴 + DIP (Repository/)</text>

  <rect x="60"  y="685" width="220" height="45" fill="#eef2ff" stroke="#2b6cb0" stroke-width="1.6"/>
  <text x="170" y="702" text-anchor="middle" font-size="11" font-style="italic" fill="#2b6cb0">&lt;&lt;interface&gt;&gt;</text>
  <text x="170" y="719" text-anchor="middle" font-size="12" font-weight="bold">ISampleRepository</text>

  <rect x="340" y="685" width="220" height="45" fill="#eef2ff" stroke="#2b6cb0" stroke-width="1.6"/>
  <text x="450" y="702" text-anchor="middle" font-size="11" font-style="italic" fill="#2b6cb0">&lt;&lt;interface&gt;&gt;</text>
  <text x="450" y="719" text-anchor="middle" font-size="12" font-weight="bold">IOrderRepository</text>

  <rect x="620" y="685" width="260" height="45" fill="#eef2ff" stroke="#2b6cb0" stroke-width="1.6"/>
  <text x="750" y="702" text-anchor="middle" font-size="11" font-style="italic" fill="#2b6cb0">&lt;&lt;interface&gt;&gt;</text>
  <text x="750" y="719" text-anchor="middle" font-size="12" font-weight="bold">IProductionQueueRepository</text>

  <!-- Service -> Repository interfaces -->
  <line x1="130" y1="285" x2="170" y2="683" stroke="#333" stroke-width="1.1" marker-end="url(#arrow)"/>
  <line x1="345" y1="285" x2="440" y2="683" stroke="#333" stroke-width="1.1" marker-end="url(#arrow)"/>
  <line x1="600" y1="285" x2="740" y2="683" stroke="#333" stroke-width="1.1" marker-end="url(#arrow)"/>
  <line x1="800" y1="285" x2="470" y2="683" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="1000" y1="285" x2="200" y2="683" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- concrete repos -->
  <rect x="60"  y="760" width="220" height="45" rx="4" fill="#e6f4ea" stroke="#2f855a" stroke-width="1.5"/>
  <text x="170" y="787" text-anchor="middle" font-size="11.5" font-weight="bold">JsonSampleRepository</text>

  <rect x="340" y="760" width="220" height="45" rx="4" fill="#e6f4ea" stroke="#2f855a" stroke-width="1.5"/>
  <text x="450" y="787" text-anchor="middle" font-size="11.5" font-weight="bold">JsonOrderRepository</text>

  <rect x="620" y="760" width="260" height="45" rx="4" fill="#e6f4ea" stroke="#2f855a" stroke-width="1.5"/>
  <text x="750" y="787" text-anchor="middle" font-size="11.5" font-weight="bold">JsonProductionQueueRepository</text>

  <rect x="920" y="760" width="230" height="45" rx="4" fill="#f5f5f5" stroke="#999" stroke-width="1.3" stroke-dasharray="3,3"/>
  <text x="1035" y="781" text-anchor="middle" font-size="11" fill="#666" font-weight="bold">Mock*Repository</text>
  <text x="1035" y="797" text-anchor="middle" font-size="9.5" fill="#666">(gmock, 테스트 전용)</text>

  <line x1="170" y1="760" x2="170" y2="732" stroke="#666" stroke-width="1.1" stroke-dasharray="5,4" marker-end="url(#arrowHollow)"/>
  <line x1="450" y1="760" x2="450" y2="732" stroke="#666" stroke-width="1.1" stroke-dasharray="5,4" marker-end="url(#arrowHollow)"/>
  <line x1="750" y1="760" x2="750" y2="732" stroke="#666" stroke-width="1.1" stroke-dasharray="5,4" marker-end="url(#arrowHollow)"/>
  <line x1="1000" y1="760" x2="500" y2="720" stroke="#999" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowHollow)"/>

  <!-- ============ Persistence ============ -->
  <rect x="400" y="880" width="220" height="45" fill="#f3e8fd" stroke="#6b46c1" stroke-width="1.6"/>
  <text x="510" y="907" text-anchor="middle" font-size="13" font-weight="bold">JsonFileStore</text>

  <line x1="170" y1="805" x2="470" y2="878" stroke="#333" stroke-width="1.1" marker-end="url(#arrow)"/>
  <line x1="450" y1="805" x2="500" y2="878" stroke="#333" stroke-width="1.1" marker-end="url(#arrow)"/>
  <line x1="750" y1="805" x2="550" y2="878" stroke="#333" stroke-width="1.1" marker-end="url(#arrow)"/>

  <!-- ============ Model ============ -->
  <text x="45" y="965" font-size="11" fill="#888">Model (데이터 구조 + JSON 매핑만, 로직 없음)</text>

  <rect x="60"  y="980" width="200" height="60" fill="#fffef5" stroke="#333" stroke-width="1.5"/>
  <text x="160" y="1000" text-anchor="middle" font-size="12.5" font-weight="bold">Sample</text>
  <text x="72" y="1018" font-size="9.5">id, name, avgProductionTime,</text>
  <text x="72" y="1031" font-size="9.5">yield, stock</text>

  <rect x="300" y="980" width="220" height="60" fill="#fffef5" stroke="#333" stroke-width="1.5"/>
  <text x="410" y="1000" text-anchor="middle" font-size="12.5" font-weight="bold">Order</text>
  <text x="312" y="1018" font-size="9.5">id, sampleId, customerName,</text>
  <text x="312" y="1031" font-size="9.5">quantity, status, createdAt</text>

  <rect x="560" y="980" width="240" height="60" fill="#fffef5" stroke="#333" stroke-width="1.5"/>
  <text x="680" y="1000" text-anchor="middle" font-size="12.5" font-weight="bold">ProductionQueueEntry</text>
  <text x="572" y="1018" font-size="9.5">orderId, sampleId, requiredQuantity,</text>
  <text x="572" y="1031" font-size="9.5">totalProductionMinutes, startedAt</text>

  <!-- Repository/Persistence -> Model -->
  <line x1="170" y1="805" x2="160" y2="978" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="450" y1="805" x2="410" y2="978" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="750" y1="805" x2="680" y2="978" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="230" y1="615" x2="410" y2="978" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="250" y="900" text-anchor="middle" font-size="10" fill="#666">manages</text>

  <rect x="20" y="1060" width="1180" height="270" rx="8" fill="#f7f7f7" stroke="#ccc"/>
  <text x="35" y="1085" font-size="13" font-weight="bold" fill="#333">범례 / 확정된 결정 사항 (docs/design.md §10)</text>
  <text x="35" y="1108" font-size="12" fill="#333">— 실선 화살표: 의존/사용(uses) · 점선+속이 빈 삼각형: 인터페이스 구현(realizes)</text>
  <text x="35" y="1130" font-size="12" fill="#333">1. 생산 큐는 단일 글로벌 FIFO 큐 — 스케줄링 로직은 ProductionService, 큐 데이터는 IProductionQueueRepository로 접근.</text>
  <text x="35" y="1152" font-size="12" fill="#333">2. 생산완료 처리는 lazy 체크로 확정 — 메뉴 진입/승인 처리 시점에 completeActive() 호출, 백그라운드 스레드 없음.</text>
  <text x="35" y="1174" font-size="12" fill="#333">3. State 객체는 stateless 싱글턴으로 확정 — Order는 IOrderState*(non-owning)만 보관, 전이마다 힙 할당 없음.</text>
  <text x="35" y="1200" font-size="12" fill="#333">구체 Repository 구현체(Json*)를 생성해 Service에 주입하는 것은 main.cpp(Composition Root) 한 곳뿐이며,</text>
  <text x="35" y="1220" font-size="12" fill="#333">Service/Controller/View는 인터페이스에만 의존한다(DIP). Dummy 데이터 생성 기능은 제출용 메뉴에 노출하지 않고</text>
  <text x="35" y="1240" font-size="12" fill="#333">테스트 픽스처 용도로만 사용한다.</text>
</svg>
