<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Segoe UI, Malgun Gothic, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arrowHollow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M1,1 L11,6 L1,11 z" fill="white" stroke="#333" stroke-width="1"/>
    </marker>
    <marker id="diamond" viewBox="0 0 12 8" refX="1" refY="4" markerWidth="14" markerHeight="10" orient="auto-start-reverse">
      <path d="M1,4 L6,1 L11,4 L6,7 z" fill="#333"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="700" fill="white"/>
  <text x="500" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">State 패턴 - Order 상태 전이</text>

  <!-- ============ Top: state transition diagram ============ -->
  <text x="20" y="58" font-size="13" fill="#666">① 상태 전이 흐름 (requirement.md 4절 / 5.4절 / 5.6절 / 5.7절)</text>

  <!-- RESERVED -->
  <rect x="40" y="75" width="150" height="55" rx="10" fill="#e8f0fe" stroke="#2b6cb0" stroke-width="2"/>
  <text x="115" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">RESERVED</text>

  <!-- CONFIRMED -->
  <rect x="430" y="75" width="150" height="55" rx="10" fill="#e6f4ea" stroke="#2f855a" stroke-width="2"/>
  <text x="505" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">CONFIRMED</text>

  <!-- RELEASE -->
  <rect x="800" y="75" width="150" height="55" rx="10" fill="#f3e8fd" stroke="#6b46c1" stroke-width="2"/>
  <text x="875" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">RELEASE</text>

  <!-- PRODUCING -->
  <rect x="430" y="220" width="150" height="55" rx="10" fill="#fef3e2" stroke="#c05621" stroke-width="2"/>
  <text x="505" y="253" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">PRODUCING</text>

  <!-- REJECTED -->
  <rect x="40" y="220" width="150" height="55" rx="10" fill="#fde8e8" stroke="#c53030" stroke-width="2"/>
  <text x="115" y="253" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">REJECTED</text>

  <!-- RESERVED -> CONFIRMED -->
  <line x1="190" y1="95" x2="428" y2="95" stroke="#333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="305" y="86" text-anchor="middle" font-size="12" fill="#2f855a">approve() 재고충분</text>

  <!-- RESERVED -> PRODUCING -->
  <line x1="150" y1="130" x2="470" y2="218" stroke="#333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="290" y="185" text-anchor="middle" font-size="12" fill="#c05621">approve() 재고부족 → enqueue()</text>

  <!-- PRODUCING -> CONFIRMED -->
  <line x1="505" y1="220" x2="505" y2="132" stroke="#333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="600" y="178" text-anchor="middle" font-size="12" fill="#c05621">completeProduction()</text>

  <!-- CONFIRMED -> RELEASE -->
  <line x1="580" y1="102" x2="798" y2="102" stroke="#333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="690" y="93" text-anchor="middle" font-size="12" fill="#6b46c1">release()</text>

  <!-- RESERVED -> REJECTED -->
  <line x1="115" y1="130" x2="115" y2="218" stroke="#333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="60" y="180" text-anchor="middle" font-size="12" fill="#c53030">reject()</text>

  <!-- ============ Bottom: class diagram ============ -->
  <text x="20" y="330" font-size="13" fill="#666">② 클래스 구조 (Domain/OrderState/)</text>

  <!-- Order class -->
  <rect x="700" y="345" width="200" height="90" fill="#fffef5" stroke="#333" stroke-width="1.6"/>
  <line x1="700" y1="370" x2="900" y2="370" stroke="#333"/>
  <text x="800" y="363" text-anchor="middle" font-size="14" font-weight="bold">Order</text>
  <text x="712" y="388" font-size="12">- state_: unique_ptr&lt;IOrderState&gt;</text>
  <text x="712" y="405" font-size="12">+ approve() / reject()</text>
  <text x="712" y="422" font-size="12">+ completeProduction() / release()</text>

  <!-- IOrderState interface -->
  <rect x="360" y="345" width="220" height="90" fill="#eef2ff" stroke="#2b6cb0" stroke-width="1.8"/>
  <text x="470" y="363" text-anchor="middle" font-size="13" font-style="italic" fill="#2b6cb0">&lt;&lt;interface&gt;&gt;</text>
  <text x="470" y="381" text-anchor="middle" font-size="14" font-weight="bold">IOrderState</text>
  <line x1="360" y1="388" x2="580" y2="388" stroke="#2b6cb0"/>
  <text x="372" y="405" font-size="11.5">+ approve() / reject()</text>
  <text x="372" y="421" font-size="11.5">+ completeProduction() / release()</text>

  <!-- composition Order -> IOrderState -->
  <line x1="700" y1="390" x2="582" y2="390" stroke="#333" stroke-width="1.6" marker-start="url(#diamond)"/>
  <text x="640" y="380" text-anchor="middle" font-size="11" fill="#555">1</text>

  <!-- concrete states -->
  <g font-size="12.5">
    <rect x="20"  y="540" width="150" height="50" rx="6" fill="#e8f0fe" stroke="#2b6cb0"/>
    <text x="95" y="570" text-anchor="middle" font-weight="bold">ReservedState</text>

    <rect x="190" y="540" width="150" height="50" rx="6" fill="#fef3e2" stroke="#c05621"/>
    <text x="265" y="570" text-anchor="middle" font-weight="bold">ProducingState</text>

    <rect x="360" y="540" width="150" height="50" rx="6" fill="#e6f4ea" stroke="#2f855a"/>
    <text x="435" y="570" text-anchor="middle" font-weight="bold">ConfirmedState</text>

    <rect x="530" y="540" width="150" height="50" rx="6" fill="#f3e8fd" stroke="#6b46c1"/>
    <text x="605" y="570" text-anchor="middle" font-weight="bold">ReleasedState</text>

    <rect x="700" y="540" width="150" height="50" rx="6" fill="#fde8e8" stroke="#c53030"/>
    <text x="775" y="570" text-anchor="middle" font-weight="bold">RejectedState</text>
  </g>

  <!-- realization arrows (dashed, hollow triangle) up to IOrderState -->
  <line x1="95"  y1="540" x2="440" y2="437" stroke="#666" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#arrowHollow)"/>
  <line x1="265" y1="540" x2="450" y2="437" stroke="#666" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#arrowHollow)"/>
  <line x1="435" y1="540" x2="465" y2="437" stroke="#666" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#arrowHollow)"/>
  <line x1="605" y1="540" x2="490" y2="437" stroke="#666" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#arrowHollow)"/>
  <line x1="775" y1="540" x2="510" y2="437" stroke="#666" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#arrowHollow)"/>

  <rect x="20" y="612" width="830" height="70" rx="8" fill="#f7f7f7" stroke="#ccc"/>
  <text x="35" y="634" font-size="12.5" fill="#333">허용되지 않는 전이(예: CONFIRMED 상태에서 reject())는 해당 상태 클래스의 메서드가</text>
  <text x="35" y="653" font-size="12.5" fill="#333">no-op이거나 예외를 던지도록 구현 → 분기문 대신 "상태 객체 자체"가 허용 규칙을 표현 (OCP).</text>
</svg>
