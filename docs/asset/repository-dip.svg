<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="Segoe UI, Malgun Gothic, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arrowHollow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M1,1 L11,6 L1,11 z" fill="white" stroke="#333" stroke-width="1"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="640" fill="white"/>
  <text x="500" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">Repository 패턴 + DIP (의존 역전)</text>

  <!-- Service layer -->
  <text x="20" y="60" font-size="13" fill="#666">① Service — 인터페이스에만 의존 (구체 클래스를 모름)</text>
  <rect x="60" y="75" width="190" height="60" fill="#fffef5" stroke="#333" stroke-width="1.6"/>
  <text x="155" y="100" text-anchor="middle" font-size="14" font-weight="bold">OrderService</text>
  <text x="155" y="120" text-anchor="middle" font-size="11.5">uses IOrderRepository&amp;</text>

  <rect x="290" y="75" width="190" height="60" fill="#fffef5" stroke="#333" stroke-width="1.6"/>
  <text x="385" y="100" text-anchor="middle" font-size="14" font-weight="bold">SampleService</text>
  <text x="385" y="120" text-anchor="middle" font-size="11.5">uses ISampleRepository&amp;</text>

  <rect x="750" y="75" width="190" height="60" fill="#fffef5" stroke="#333" stroke-width="1.6"/>
  <text x="845" y="100" text-anchor="middle" font-size="14" font-weight="bold">Test Subagent</text>
  <text x="845" y="120" text-anchor="middle" font-size="11.5">단위 테스트 작성</text>

  <!-- interfaces -->
  <text x="20" y="185" font-size="13" fill="#666">② Repository 인터페이스 (Repository/I*.h)</text>
  <rect x="130" y="200" width="220" height="70" fill="#eef2ff" stroke="#2b6cb0" stroke-width="1.8"/>
  <text x="240" y="220" text-anchor="middle" font-size="12.5" font-style="italic" fill="#2b6cb0">&lt;&lt;interface&gt;&gt;</text>
  <text x="240" y="240" text-anchor="middle" font-size="14" font-weight="bold">IOrderRepository</text>
  <line x1="130" y1="247" x2="350" y2="247" stroke="#2b6cb0"/>
  <text x="142" y="262" font-size="11">findById() / save()</text>

  <rect x="430" y="200" width="220" height="70" fill="#eef2ff" stroke="#2b6cb0" stroke-width="1.8"/>
  <text x="540" y="220" text-anchor="middle" font-size="12.5" font-style="italic" fill="#2b6cb0">&lt;&lt;interface&gt;&gt;</text>
  <text x="540" y="240" text-anchor="middle" font-size="14" font-weight="bold">ISampleRepository</text>
  <line x1="430" y1="247" x2="650" y2="247" stroke="#2b6cb0"/>
  <text x="442" y="262" font-size="11">findById() / findAll() / save()</text>

  <!-- dependency arrows Service -> Interface -->
  <line x1="200" y1="135" x2="235" y2="198" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="400" y1="135" x2="500" y2="198" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- concrete impls -->
  <text x="20" y="330" font-size="13" fill="#666">③ 구현체 — main.cpp에서 생성해 Service에 주입(DI), Test는 별도 Mock 주입</text>

  <rect x="120" y="345" width="230" height="55" rx="6" fill="#e6f4ea" stroke="#2f855a" stroke-width="1.6"/>
  <text x="235" y="378" text-anchor="middle" font-size="13" font-weight="bold">JsonOrderRepository</text>

  <rect x="420" y="345" width="230" height="55" rx="6" fill="#e6f4ea" stroke="#2f855a" stroke-width="1.6"/>
  <text x="535" y="378" text-anchor="middle" font-size="13" font-weight="bold">JsonSampleRepository</text>

  <rect x="720" y="345" width="230" height="55" rx="6" fill="#fef3e2" stroke="#c05621" stroke-width="1.6" stroke-dasharray="3,3"/>
  <text x="835" y="368" text-anchor="middle" font-size="13" font-weight="bold">InMemorySampleRepository</text>
  <text x="835" y="386" text-anchor="middle" font-size="11">(테스트 전용 Mock)</text>

  <!-- realization arrows impl -> interface -->
  <line x1="235" y1="345" x2="240" y2="272" stroke="#666" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#arrowHollow)"/>
  <line x1="535" y1="345" x2="540" y2="272" stroke="#666" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#arrowHollow)"/>
  <line x1="820" y1="345" x2="600" y2="255" stroke="#666" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#arrowHollow)"/>

  <!-- Persistence -->
  <text x="20" y="450" font-size="13" fill="#666">④ 구현체는 Persistence(순수 파일 I/O)에만 의존</text>
  <rect x="330" y="465" width="230" height="55" fill="#f3e8fd" stroke="#6b46c1" stroke-width="1.6"/>
  <text x="445" y="497" text-anchor="middle" font-size="13" font-weight="bold">JsonFileStore</text>

  <line x1="235" y1="400" x2="400" y2="463" stroke="#333" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="535" y1="400" x2="470" y2="463" stroke="#333" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- main.cpp injection -->
  <rect x="330" y="560" width="230" height="55" rx="6" fill="#fffbea" stroke="#b7791f" stroke-width="1.8"/>
  <text x="445" y="592" text-anchor="middle" font-size="13" font-weight="bold">main.cpp (Composition Root)</text>

  <line x1="400" y1="560" x2="240" y2="405" stroke="#b7791f" stroke-width="1.4" stroke-dasharray="2,3" marker-end="url(#arrow)"/>
  <line x1="490" y1="560" x2="540" y2="405" stroke="#b7791f" stroke-width="1.4" stroke-dasharray="2,3" marker-end="url(#arrow)"/>
  <text x="290" y="490" font-size="11" fill="#b7791f">creates &amp; injects</text>

  <rect x="20" y="565" width="290" height="55" rx="8" fill="#f7f7f7" stroke="#ccc"/>
  <text x="35" y="587" font-size="12" fill="#333">구체 타입을 아는 곳은 main.cpp 한 곳뿐.</text>
  <text x="35" y="605" font-size="12" fill="#333">Service/Controller/View는 인터페이스만 안다.</text>
</svg>
